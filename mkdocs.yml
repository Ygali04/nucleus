      - Data model: design/data-model.md
      - Orchestrator: design/orchestrator.md
      - State machine: design/state-machine.md
      - Tenant isolation: design/tenant-isolation.md
      - Authentication: design/auth.md
      - Observability: design/observability.md
      - CI/CD: design/cicd.md
      - Security: design/security.md
      - Rate limiting: design/rate-limiting.md
      - Dataflow: design/dataflow.md
      - Failure modes: design/failure-modes.md
  - Stack:
      - Overview: stack/index.md
      - Composition: stack/composition.md
      - Diffusion video: stack/diffusion-video.md
      - Avatar, voice, music: stack/avatar-voice-music.md
      - Decisions per archetype: stack/decisions.md
  - Ingestion:
      - Overview: ingestion/index.md
      - Brand KB schema: ingestion/brand-kb-schema.md
      - Connectors: ingestion/connectors.md
      - RAG query pattern: ingestion/rag-query-pattern.md
      - MCP integration: ingestion/mcp-integration.md
      - Research pipeline: ingestion/research-pipeline.md
  - Brand:
      - Overview: brand/index.md
      - Naming: brand/naming.md
      - Visual identity: brand/visual-identity.md
      - Voice and tone: brand/voice-and-tone.md
      - In-product brand: brand/in-product-brand.md
  - Go-to-market:
      - Overview: gtm/index.md
      - Pricing: gtm/pricing.md
      - Packaging: gtm/packaging.md
