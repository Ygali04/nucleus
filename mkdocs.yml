      - TRIBE v2 deep dive: research/tribe-v2-deep-dive.md
      - Alternative models: research/alternative-models.md
      - Benchmark datasets: research/datasets.md
      - Evaluation methodology: research/evaluation-methodology.md
      - Benchmarks: research/benchmarks.md
      - Honest gaps: research/honest-gaps.md
      - Research roadmap: research/research-roadmap.md
      - Internal experiments: research/internal-experiments.md
      - Fallback path: research/fallback-path.md
      - Reading list: research/reading-list.md
  - Runbooks:
      - Overview: runbooks/index.md
      - Onboarding a tenant: runbooks/onboarding-tenant.md
