  - The product:
      - Concept: concept.md
      - Features: features.md
      - How it works: how-it-works.md
      - Output archetypes: archetypes.md
  - Why it works:
      - Research foundation: foundation.md
      - Competitive landscape: landscape.md
  - Delivery:
      - Integration: integration.md
      - Roadmap: roadmap.md
  - System design:
